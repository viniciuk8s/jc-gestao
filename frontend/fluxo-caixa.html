<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#172E45">
  <meta name="description" content="Controle de fluxo de caixa da JC Elétrica &amp; Solar.">
    <title>Fluxo de Caixa — JC Elétrica &amp; Solar</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <link rel="stylesheet" href="src/css/app.css">

 <!-- Supabase (CDN) + proteção de sessão -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="src/js/supabase.js"></script>
  <script defer src="src/js/config.js"></script>
  <script defer src="src/js/api.js"></script>
  <script defer src="src/js/auth-guard.js"></script>
  <script defer src="src/js/layout.js"></script>
  <script defer src="src/js/sidebar.js"></script>
  <script defer src="src/js/dropdown.js"></script>
  <!-- utilitários compartilhados + UI (toast/confirm) -->
  <script defer src="src/js/utils.js"></script>
  <script defer src="src/js/ui.js"></script>
  <script defer src="src/js/modal.js"></script>
  <script defer src="src/js/fluxo.js"></script>


</head>

<body data-page="fluxo">


   <main class="main-content">

    <div class="cashflow">

      <!-- Cabeçalho -->
      <div class="cf-header">
        <div>
          <div class="cf-eyebrow">Fluxo de Caixa</div>
          <h1>Movimentações</h1>
        </div>
        <div class="cf-actions">
          <button type="button" class="btn-ghost" id="cf-export"><i class="bi bi-download" aria-hidden="true"></i> Exportar CSV</button>
          <button type="button" class="btn-solid" id="cf-add" onclick="openModal()"><i class="bi bi-plus-lg" aria-hidden="true"></i> Novo lançamento</button>
        </div>
      </div>

      <!-- Barra de ferramentas -->
      <div class="cf-toolbar">
        <div class="cf-segment" id="cf-period">
          <button type="button" data-period="7">7 dias</button>
          <button type="button" data-period="30" class="active">30 dias</button>
          <button type="button" data-period="90">90 dias</button>
          <button type="button" data-period="all">Tudo</button>
        </div>
        <div class="cf-filters">
          <select class="cf-select" id="cf-type">
            <option value="todos">Todos os tipos</option>
            <option value="entrada">Entradas</option>
            <option value="saida">Saídas</option>
          </select>
          <div class="cf-search">
            <i class="bi bi-search" aria-hidden="true"></i>
            <input type="text" id="cf-search" aria-label="Buscar lançamentos" placeholder="Buscar descrição ou categoria...">
          </div>
        </div>
      </div>

      <!-- Resumo do período -->
      <div class="cf-summary">
        <div class="cf-sum in">
          <span class="l">Entradas no período</span>
          <span class="v" id="cf-sum-in">R$ 0,00</span>
        </div>
        <div class="cf-sum out">
          <span class="l">Saídas no período</span>
          <span class="v" id="cf-sum-out">R$ 0,00</span>
        </div>
        <div class="cf-sum net">
          <span class="l">Resultado do período</span>
          <span class="v pos" id="cf-sum-net">R$ 0,00</span>
        </div>
        <div class="cf-sum">
          <span class="l">Saldo em caixa</span>
          <span class="v" id="cf-sum-caixa">R$ 0,00</span>
        </div>
      </div>

      <!-- Livro-caixa -->
      <div class="table-container">

        <div class="table-header">
          <div>
            <h2>Livro-caixa</h2>
            <p class="cf-table-meta" id="cf-meta"></p>
          </div>
        </div>

        <div class="table-responsive">
          <table class="modern-table cf-table">
            <thead>
              <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Forma</th>
                <th>Status</th>
                <th class="num">Valor</th>
                <th class="num">Saldo</th>
              </tr>
            </thead>
            <tbody id="cf-tbody"></tbody>
          </table>
        </div>

      </div>

    </div>


    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modern-modal" role="dialog" aria-modal="true" aria-labelledby="cf-modal-title">

        <div class="modal-header">
          <div class="modal-title">
            <h2 id="cf-modal-title">Novo lançamento</h2>
            <p>Registre uma entrada ou saída no caixa</p>
          </div>
          <button type="button" class="close-btn" onclick="closeModal()" aria-label="Fechar"><i class="ti ti-x" aria-hidden="true"></i></button>
        </div>

        <form class="modal-form" id="cf-form">
          <div class="form-grid">

            <div class="input-group">
              <label for="f-tipo">Tipo</label>
              <select id="f-tipo">
                <option value="entrada">Entrada</option>
                <option value="saida">Saída</option>
              </select>
            </div>

            <div class="input-group">
              <label for="f-status">Status</label>
              <select id="f-status">
                <option value="pago">Pago</option>
                <option value="pendente">Pendente</option>
                <option value="agendado">Agendado</option>
              </select>
            </div>

            <div class="input-group full">
              <label for="f-descricao">Descrição</label>
              <input type="text" id="f-descricao" placeholder="Ex: Instalação solar — Cliente X">
            </div>

            <div class="input-group">
              <label for="f-categoria">Categoria</label>
              <input type="text" id="f-categoria" list="cf-categorias" placeholder="Ex: Serviços">
              <datalist id="cf-categorias">
                <option value="Serviços"></option>
                <option value="Instalação solar"></option>
                <option value="Vendas"></option>
                <option value="Fornecedores"></option>
                <option value="Folha de pagamento"></option>
                <option value="Impostos"></option>
                <option value="Combustível"></option>
                <option value="Ferramentas"></option>
                <option value="Aluguel"></option>
                <option value="Outros"></option>
              </datalist>
            </div>

            <div class="input-group">
              <label for="f-forma">Forma de pagamento</label>
              <select id="f-forma">
                <option>Pix</option>
                <option>Dinheiro</option>
                <option>Cartão</option>
                <option>Boleto</option>
                <option>Transferência</option>
              </select>
            </div>

            <div class="input-group">
              <label for="f-data">Data</label>
              <input type="date" id="f-data">
            </div>

            <div class="input-group">
              <label for="f-valor">Valor (R$)</label>
              <input type="number" id="f-valor" step="0.01" min="0" placeholder="0,00">
            </div>

            <div class="input-group full">
              <p class="form-error" id="cf-form-error"></p>
            </div>

          </div>

          <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button type="submit" class="btn-save">Salvar lançamento</button>
          </div>
        </form>

      </div>
    </div>

   </main>
   

</body>
</html>
