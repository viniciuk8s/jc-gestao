<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#172E45">
  <meta name="description" content="Relatórios financeiros e de pagamentos da JC Elétrica &amp; Solar.">
    <title>Relatórios — JC Elétrica &amp; Solar</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <link rel="stylesheet" href="src/css/app.css">

 <!-- Supabase (CDN) + proteção de sessão -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="src/js/supabase.js"></script>
  <script defer src="src/js/config.js"></script>
  <script defer src="src/js/api.js"></script>
  <script defer src="src/js/auth-guard.js"></script>
  <script defer src="src/js/layout.js"></script>
  <script defer src="src/js/sidebar.js"></script>
  <script defer src="src/js/dropdown.js"></script>
  <!-- utilitários compartilhados + UI (toast/confirm) -->
  <script defer src="src/js/utils.js"></script>
  <script defer src="src/js/ui.js"></script>
  <script defer src="src/js/modal.js"></script>
  <script defer src="src/js/relatorios.js"></script>


</head>

<body data-page="relatorios">


  <main class="main-content">

    <div class="rel">

      <!-- Cabeçalho -->
      <div class="rel-header no-print">
        <div>
          <div class="rel-eyebrow">Relatórios</div>
          <h1>Relatórios</h1>
        </div>
        <div class="rel-actions">
          <button type="button" class="btn-ghost" id="rel-export"><i class="bi bi-download" aria-hidden="true"></i> Exportar CSV</button>
          <button type="button" class="btn-ghost" id="rel-print"><i class="bi bi-printer" aria-hidden="true"></i> Imprimir</button>
        </div>
      </div>

      <!-- Abas -->
      <div class="rel-tabs no-print" id="rel-tabs">
        <button type="button" data-tab="pagamentos" class="active"><i class="bi bi-cash-coin" aria-hidden="true"></i> Pagamentos a funcionários</button>
        <button type="button" data-tab="financeiro"><i class="bi bi-graph-up" aria-hidden="true"></i> Financeiro do mês</button>
      </div>

      <!-- ABA: PAGAMENTOS -->
      <section id="tab-pagamentos" class="rel-tab">
        <div class="rel-toolbar no-print">
          <label class="rel-field">
            <span>Funcionário</span>
            <select id="pg-func" class="rel-select"></select>
          </label>
          <label class="rel-field">
            <span>Ano</span>
            <select id="pg-ano" class="rel-select"></select>
          </label>
          <button type="button" class="btn-solid" id="pg-add"><i class="bi bi-plus-lg" aria-hidden="true"></i> Registrar pagamento</button>
        </div>
        <div id="pg-report" class="report-card"></div>
      </section>

      <!-- ABA: FINANCEIRO -->
      <section id="tab-financeiro" class="rel-tab" hidden>
        <div class="rel-toolbar no-print">
          <label class="rel-field">
            <span>Mês</span>
            <select id="fin-mes" class="rel-select"></select>
          </label>
          <label class="rel-field">
            <span>Ano</span>
            <select id="fin-ano" class="rel-select"></select>
          </label>
        </div>
        <div id="fin-report" class="report-card"></div>
      </section>

    </div>


    <!-- MODAL: registrar pagamento -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modern-modal" role="dialog" aria-modal="true" aria-labelledby="pg-modal-title">

        <div class="modal-header">
          <div class="modal-title">
            <h2 id="pg-modal-title">Registrar pagamento</h2>
            <p>Lance um pagamento efetuado a um funcionário</p>
          </div>
          <button type="button" class="close-btn" onclick="closeModal()" aria-label="Fechar"><i class="ti ti-x" aria-hidden="true"></i></button>
        </div>

        <form class="modal-form" id="pg-form">
          <input type="hidden" id="pf-id">
          <div class="form-grid">

            <div class="input-group full">
              <label for="pf-func">Funcionário</label>
              <select id="pf-func"></select>
            </div>

            <div class="input-group">
              <label for="pf-tipo">Tipo de pagamento</label>
              <select id="pf-tipo">
                <option>Salário</option>
                <option>Adiantamento</option>
                <option>Bônus</option>
                <option>Comissão</option>
                <option>Vale</option>
                <option>Férias</option>
                <option>13º salário</option>
              </select>
            </div>

            <div class="input-group">
              <label for="pf-forma">Forma de pagamento</label>
              <select id="pf-forma">
                <option>Transferência</option>
                <option>Pix</option>
                <option>Dinheiro</option>
                <option>Cartão</option>
              </select>
            </div>

            <div class="input-group">
              <label for="pf-data">Data do pagamento</label>
              <input type="date" id="pf-data">
            </div>

            <div class="input-group">
              <label for="pf-comp">Competência</label>
              <input type="month" id="pf-comp">
            </div>

            <div class="input-group full">
              <label for="pf-valor">Valor (R$)</label>
              <input type="number" id="pf-valor" step="0.01" min="0" placeholder="0,00">
            </div>

            <div class="input-group full">
              <label for="pf-obs">Detalhes</label>
              <textarea id="pf-obs" rows="2" placeholder="Ex: referente ao mês, horas extras, meta atingida..."></textarea>
            </div>

            <div class="input-group full">
              <p class="form-error" id="pf-error"></p>
            </div>

          </div>

          <div class="modal-footer">
            <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button type="submit" class="btn-save">Salvar pagamento</button>
          </div>
        </form>

      </div>
    </div>

  </main>
   

</body>
</html>
