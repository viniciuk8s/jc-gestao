<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#172E45">
  <meta name="description" content="Acesso ao painel de gestão da JC Elétrica & Solar.">
  <title>Entrar — JC Elétrica &amp; Solar</title>

  <link rel="icon" type="image/png" href="src/img/icone-laranja.png">

  <!-- Fontes (independentes do sistema) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/css/app.css">
  <link rel="stylesheet" href="src/css/login.css">

 <!-- Supabase (CDN) + proteção de sessão -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="src/js/supabase.js"></script>
  <script defer src="src/js/config.js"></script>
  <script defer src="src/js/api.js"></script>
  <script defer src="src/js/auth-guard.js"></script>
  <script defer src="src/js/layout.js"></script>
  <script defer src="src/js/sidebar.js"></script>
  <script defer src="src/js/dropdown.js"></script>
</head>

<body class="auth-body">

  <main class="auth-card">

    <!-- Marca -->
    <div class="auth-brandmark">
      <span class="auth-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2 3 14h9l-1 8 10-12h-9l1-8Z"/>
        </svg>
      </span>
      <div class="auth-brandtext">
        <strong>JC Elétrica &amp; Solar</strong>
        <span>Painel de Gestão</span>
      </div>
    </div>

    <!-- Cabeçalho -->
    <header class="auth-head">
      <h1>Bem-vindo de volta</h1>
      <p>Entre com sua conta para acessar o painel.</p>
    </header>

    <!-- Formulário -->
    <form id="login-form" novalidate>

      <div class="field">
        <label for="email">E-mail</label>
        <div class="control">
          <span class="control-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" autocomplete="email" inputmode="email"
                 placeholder="nome@jceletrica.com" required>
        </div>
      </div>

      <div class="field">
        <div class="field-top">
          <label for="senha">Senha</label>
          <button type="button" class="link" id="btn-forgot">Esqueci minha senha</button>
        </div>
        <div class="control">
          <span class="control-ico" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="senha" name="senha" autocomplete="current-password"
                 placeholder="••••••••" required>
          <button type="button" class="toggle" id="toggle-senha" aria-label="Mostrar senha">
            <svg class="icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
              <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c6.5 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
              <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3.5 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
              <line x1="2" x2="22" y1="2" y2="22"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="form-error" id="auth-error" role="alert" aria-live="polite"></p>

      <button type="submit" class="btn-primary" id="btn-entrar">
        <span class="btn-label">Entrar</span>
        <span class="btn-loading" aria-hidden="true">Entrando…</span>
      </button>
    </form>

    <footer class="auth-foot">
      Acesso restrito a colaboradores. © <span id="ano"></span> JC Elétrica &amp; Solar.
    </footer>

  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>document.getElementById('ano').textContent = new Date().getFullYear();</script>

</body>
</html>
