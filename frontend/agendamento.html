<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172E45">
  <meta name="description" content="Agenda de serviços da JC Elétrica &amp; Solar.">
  <title>Agenda — JC Elétrica &amp; Solar</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- Módulos -->
  <link rel="stylesheet" href="src/css/app.css">

  <!-- Estilo da agenda (embutido, a prova de cache): cabecalho + calendario responsivo -->
  <style id="agenda-fix">
    body[data-page="agenda"] .main-content { max-width: 1100px; margin: 0 auto; padding: 24px; box-sizing: border-box; }

    /* ---- Cabecalho apresentativo ---- */
    body[data-page="agenda"] .cal-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }
    body[data-page="agenda"] .cal-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .09em; text-transform: uppercase; color: var(--brand, #F97315); margin-bottom: 6px; }
    body[data-page="agenda"] .cal-title { margin: 0; font-family: 'Syne','Sora',system-ui,sans-serif; font-size: 30px; line-height: 1.05; font-weight: 800; letter-spacing: -.01em; color: var(--heading, #F6F8FC); }
    body[data-page="agenda"] .services-title { font-family: 'Syne','Sora',system-ui,sans-serif; font-size: 20px; font-weight: 700; margin: 0; color: var(--heading, #F6F8FC); }

    /* ---- Navegacao de mes ---- */
    body[data-page="agenda"] .cal-nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    body[data-page="agenda"] .cal-stepper { display: flex; align-items: center; gap: 6px; }
    body[data-page="agenda"] .cal-today,
    body[data-page="agenda"] .nav-btn,
    body[data-page="agenda"] .cal-select {
      height: 38px; border: 1px solid var(--line, rgba(255,255,255,.14)); border-radius: 8px;
      background: rgba(255,255,255,.05); color: var(--text, #E8EDF5); font-size: 13.5px; font-family: inherit; cursor: pointer; padding: 0 12px;
    }
    body[data-page="agenda"] .nav-btn { width: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    body[data-page="agenda"] .cal-select { -webkit-appearance: none; appearance: none; padding-right: 28px; }
    body[data-page="agenda"] .cal-today:hover,
    body[data-page="agenda"] .nav-btn:hover { border-color: var(--brand, #F97315); color: var(--brand, #F97315); }

    /* ---- Calendario: 7 colunas fluidas (cabe em qualquer largura) ---- */
    body[data-page="agenda"] .calendar-section { margin-bottom: 28px; }
    body[data-page="agenda"] .calendar-wrapper { width: 100%; box-sizing: border-box; }
    body[data-page="agenda"] .weekdays-header,
    body[data-page="agenda"] .days-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; }
    body[data-page="agenda"] .weekdays-header { margin-bottom: 8px; }
    body[data-page="agenda"] .weekdays-header span { text-align: center; font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; color: var(--text-muted, #9AA6BC); }
    body[data-page="agenda"] .day-cell { min-width: 0; }
    body[data-page="agenda"] .day-btn {
      position: relative; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--line, rgba(255,255,255,.1)); border-radius: 8px; background: rgba(255,255,255,.04);
      color: var(--text, #E8EDF5); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: border-color .15s, background .15s, color .15s;
    }
    body[data-page="agenda"] .day-btn:hover { border-color: var(--brand, #F97315); background: rgba(249,115,21,.12); }
    body[data-page="agenda"] .day-cell.empty .day-btn { visibility: hidden; cursor: default; }
    body[data-page="agenda"] .day-btn.today { border-color: var(--brand, #F97315); color: var(--brand, #F97315); font-weight: 800; }
    body[data-page="agenda"] .day-btn.has-event { background: linear-gradient(180deg, #FB8C3C, #F97315 60%, #E8620A); color: #fff; border-color: transparent; }
    body[data-page="agenda"] .event-count {
      position: absolute; top: 3px; right: 3px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px;
      background: #fff; color: #F97315; font-size: 10px; font-weight: 800; display: flex; align-items: center; justify-content: center; line-height: 1;
    }

    /* mantem o modal HTML antigo escondido (agora usamos o JC.modal) */
    body[data-page="agenda"] #modal-overlay { display: none; }

    /* ---- Responsivo ---- */
    @media (max-width: 640px) {
      body[data-page="agenda"] .main-content { padding: 16px; }
      body[data-page="agenda"] .cal-head { margin-bottom: 16px; }
      body[data-page="agenda"] .cal-title { font-size: 23px; }
      body[data-page="agenda"] .cal-nav { width: 100%; flex-direction: column; align-items: stretch; }
      body[data-page="agenda"] .cal-today { width: 100%; }
      body[data-page="agenda"] .cal-stepper { width: 100%; }
      body[data-page="agenda"] .cal-select.cal-year { flex: 0 0 auto; }
      body[data-page="agenda"] .cal-select { flex: 1; min-width: 0; }
      body[data-page="agenda"] .weekdays-header, body[data-page="agenda"] .days-grid { gap: 4px; }
      body[data-page="agenda"] .day-btn { font-size: 13px; border-radius: 6px; }
      body[data-page="agenda"] .weekdays-header span { font-size: 10px; }
    }
  </style>


  <!-- Supabase (CDN) + proteção de sessão -->
<!-- Supabase + sessão. Ordem: supabase -> config -> auth-guard -> layout -> sidebar -> dropdown -> utils -> ui -> api -> calendario -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="src/js/supabase.js"></script>
  <script defer src="src/js/config.js"></script>
  <script defer src="src/js/auth-guard.js"></script>
  <script defer src="src/js/layout.js"></script>
  <script defer src="src/js/sidebar.js"></script>
  <script defer src="src/js/dropdown.js"></script>
  <script defer src="src/js/utils.js"></script>
  <script defer src="src/js/ui.js"></script>
  <script defer src="src/js/api.js"></script>
  <script defer src="src/js/modal.js"></script>
  <script defer src="src/js/calendario.js"></script>

</head>
<body data-page="agenda">


    

  <!-- MAIN -->
  <main class="main-content">

    <div class="cal-head">
      <div class="cal-headings">
        <div class="cal-eyebrow">Agenda de serviços</div>
        <h1 class="cal-title">Agendamentos</h1>
      </div>

      <div class="cal-nav">
        <button type="button" class="cal-today" id="btn-today"><i class="bi bi-dot-circle" aria-hidden="true"></i> Hoje</button>
        <div class="cal-stepper">
          <button type="button" class="nav-btn" id="prev-month" aria-label="Mês anterior"><i class="bi bi-chevron-left" aria-hidden="true"></i></button>
          <select class="cal-select" id="sel-month" aria-label="Selecionar mês"></select>
          <select class="cal-select cal-year" id="sel-year" aria-label="Selecionar ano"></select>
          <button type="button" class="nav-btn" id="next-month" aria-label="Próximo mês"><i class="bi bi-chevron-right" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>

    <!-- CALENDÁRIO -->
    <section class="calendar-section">
      <div class="calendar-wrapper">

        <!-- Cabeçalho dos dias da semana -->
        <div class="weekdays-header">
          <span>Dom</span>
          <span>Seg</span>
          <span>Ter</span>
          <span>Qua</span>
          <span>Qui</span>
          <span>Sex</span>
          <span>Sáb</span>
        </div>

        <!-- Grade de dias -->
        <div class="days-grid" id="days-grid">
          <!-- Preenchido via JS -->
        </div>

      </div>
    </section>

    <!-- TABELA DE SERVIÇOS -->
    <section class="services-section">
      <div class="services-header">
        <div>
          <div class="cal-eyebrow">Agendados pelo calendário</div>
          <h2 class="services-title">Serviços agendados</h2>
        </div>
        <div class="services-meta">
          <span class="services-count" id="services-count">0 serviços</span>
          <span class="services-total" id="services-total"></span>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="services-table cal-table" id="services-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Serviço</th>
              <th>Cliente</th>
              <th>Horário</th>
              <th class="num">Valor</th>
              <th>Status</th>
              <th aria-label="Ações"></th>
            </tr>
          </thead>
          <tbody id="services-tbody">
            <tr class="empty-row" id="empty-row">
              <td colspan="7">
                <div class="empty-state">
                  <div class="empty-icon"><i class="bi bi-calendar2-week" aria-hidden="true"></i></div>
                  <p>Nenhum serviço agendado ainda.<br>Clique em um dia no calendário para começar.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button type="button" class="modal-close" id="modal-close" aria-label="Fechar">&times;</button>

      <div class="modal-header">
        <div class="modal-date-badge" id="modal-date-badge"></div>
        <h3 class="modal-title" id="modal-title">Novo Agendamento</h3>
        <p class="modal-subtitle">Preencha os dados do serviço</p>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="field-servico">Serviço <span class="req">*</span></label>
          <input type="text" id="field-servico" placeholder="Ex: Instalação de painel solar" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="field-cliente">Cliente <span class="req">*</span></label>
          <input type="text" id="field-cliente" placeholder="Nome do cliente" autocomplete="off" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-horario">Horário <span class="req">*</span></label>
            <input type="time" id="field-horario" />
          </div>
          <div class="form-group">
            <label for="field-valor">Valor (R$)</label>
            <input type="number" id="field-valor" placeholder="0,00" min="0" step="0.01" />
          </div>
        </div>

        <div class="form-group">
          <label for="field-status">Status</label>
          <select id="field-status">
            <option value="confirmado">Confirmado</option>
            <option value="pendente">Pendente</option>
            <option value="concluido">Concluído</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>

        <div class="form-group">
          <label for="field-obs">Observações</label>
          <textarea id="field-obs" rows="3" placeholder="Alguma observação adicional..."></textarea>
        </div>

        <p class="form-error" id="form-error"></p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btn-cancel-modal">Cancelar</button>
        <button type="button" class="btn-primary" id="btn-save">Salvar Agendamento</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</body>
</html>
