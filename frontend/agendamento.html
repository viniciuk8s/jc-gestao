<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#172E45">
  <meta name="description" content="Agenda de serviços da JC Elétrica &amp; Solar.">
  <title>Agenda — JC Elétrica &amp; Solar</title>

  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Ícones -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

  <!-- Módulos -->
  <link rel="stylesheet" href="src/css/app.css">

  <!-- Supabase (CDN) + proteção de sessão -->
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="src/js/supabase.js"></script>
  <script defer src="src/js/config.js"></script>
  <script defer src="src/js/api.js"></script>
  <script defer src="src/js/auth-guard.js"></script>
  <script defer src="src/js/layout.js"></script>
  <script defer src="src/js/sidebar.js"></script>
  <script defer src="src/js/dropdown.js"></script>

<!-- ... os demais scripts da página ... -->
  <!-- utilitários compartilhados + UI (toast/confirm) -->
  <script defer src="src/js/utils.js"></script>
  <script defer src="src/js/ui.js"></script>
  <script defer src="src/js/calendario.js"></script>

</head>
<body data-page="agenda">


    

  <!-- MAIN -->
  <main class="main-content">

    <div class="cal-head">
      <div class="cal-headings">
        <div class="cal-eyebrow">Agenda de serviços</div>
        <h1 class="cal-title">Agendamentos</h1>
      </div>

      <div class="cal-nav">
        <button type="button" class="cal-today" id="btn-today"><i class="bi bi-dot-circle" aria-hidden="true"></i> Hoje</button>
        <div class="cal-stepper">
          <button type="button" class="nav-btn" id="prev-month" aria-label="Mês anterior"><i class="bi bi-chevron-left" aria-hidden="true"></i></button>
          <select class="cal-select" id="sel-month" aria-label="Selecionar mês"></select>
          <select class="cal-select cal-year" id="sel-year" aria-label="Selecionar ano"></select>
          <button type="button" class="nav-btn" id="next-month" aria-label="Próximo mês"><i class="bi bi-chevron-right" aria-hidden="true"></i></button>
        </div>
      </div>
    </div>

    <!-- CALENDÁRIO -->
    <section class="calendar-section">
      <div class="calendar-wrapper">

        <!-- Cabeçalho dos dias da semana -->
        <div class="weekdays-header">
          <span>Dom</span>
          <span>Seg</span>
          <span>Ter</span>
          <span>Qua</span>
          <span>Qui</span>
          <span>Sex</span>
          <span>Sáb</span>
        </div>

        <!-- Grade de dias -->
        <div class="days-grid" id="days-grid">
          <!-- Preenchido via JS -->
        </div>

      </div>
    </section>

    <!-- TABELA DE SERVIÇOS -->
    <section class="services-section">
      <div class="services-header">
        <div>
          <div class="cal-eyebrow">Agendados pelo calendário</div>
          <h2 class="services-title">Serviços agendados</h2>
        </div>
        <div class="services-meta">
          <span class="services-count" id="services-count">0 serviços</span>
          <span class="services-total" id="services-total"></span>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="services-table cal-table" id="services-table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Serviço</th>
              <th>Cliente</th>
              <th>Horário</th>
              <th class="num">Valor</th>
              <th>Status</th>
              <th aria-label="Ações"></th>
            </tr>
          </thead>
          <tbody id="services-tbody">
            <tr class="empty-row" id="empty-row">
              <td colspan="7">
                <div class="empty-state">
                  <div class="empty-icon"><i class="bi bi-calendar2-week" aria-hidden="true"></i></div>
                  <p>Nenhum serviço agendado ainda.<br>Clique em um dia no calendário para começar.</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button type="button" class="modal-close" id="modal-close" aria-label="Fechar">&times;</button>

      <div class="modal-header">
        <div class="modal-date-badge" id="modal-date-badge"></div>
        <h3 class="modal-title" id="modal-title">Novo Agendamento</h3>
        <p class="modal-subtitle">Preencha os dados do serviço</p>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="field-servico">Serviço <span class="req">*</span></label>
          <input type="text" id="field-servico" placeholder="Ex: Instalação de painel solar" autocomplete="off" />
        </div>

        <div class="form-group">
          <label for="field-cliente">Cliente <span class="req">*</span></label>
          <input type="text" id="field-cliente" placeholder="Nome do cliente" autocomplete="off" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="field-horario">Horário <span class="req">*</span></label>
            <input type="time" id="field-horario" />
          </div>
          <div class="form-group">
            <label for="field-valor">Valor (R$)</label>
            <input type="number" id="field-valor" placeholder="0,00" min="0" step="0.01" />
          </div>
        </div>

        <div class="form-group">
          <label for="field-status">Status</label>
          <select id="field-status">
            <option value="confirmado">Confirmado</option>
            <option value="pendente">Pendente</option>
            <option value="cancelado">Cancelado</option>
          </select>
        </div>

        <div class="form-group">
          <label for="field-obs">Observações</label>
          <textarea id="field-obs" rows="3" placeholder="Alguma observação adicional..."></textarea>
        </div>

        <p class="form-error" id="form-error"></p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btn-cancel-modal">Cancelar</button>
        <button type="button" class="btn-primary" id="btn-save">Salvar Agendamento</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

</body>
</html>
